<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSGVO Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black:   #333333;
    --gold:    #f6ab17;
    --gold-dk: #e88c14;
    --red:     #d21f27;
    --red-dk:  #ae1b26;
    --beige:   #faf8f3;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--beige);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2.5rem 1rem 4rem;
    font-family: 'Outfit', sans-serif;
    color: var(--black);
  }

  .card {
    width: 100%;
    max-width: 700px;
    background: #fff;
    border-radius: 20px;
    border: 2px solid var(--black);
    box-shadow: 6px 6px 0px var(--black);
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--black);
    padding: 2.5rem 2.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(246,171,23,0.15) 0%, transparent 65%);
    pointer-events: none;
  }
  .header-icon {
    font-size: 2.8rem;
    display: block;
    margin-bottom: 0.75rem;
  }
  .header h1 {
    font-size: 1.9rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .header h1 span { color: var(--gold); }
  .header p {
    margin-top: 0.5rem;
    color: rgba(255,255,255,0.5);
    font-size: 0.95rem;
    font-weight: 400;
  }

  /* Gold accent bar */
  .accent-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold-dk) 50%, var(--red) 100%);
  }

  /* Form */
  .form-section {
    padding: 2rem 2.5rem;
    border-bottom: 2px solid rgba(51,51,51,0.08);
  }
  .input-row { display: flex; gap: 0.75rem; }

  input[type="url"] {
    flex: 1;
    background: var(--beige);
    border: 2px solid rgba(51,51,51,0.2);
    border-radius: 10px;
    padding: 0.85rem 1.1rem;
    color: var(--black);
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="url"]:focus { border-color: var(--gold); }
  input[type="url"]::placeholder { color: rgba(51,51,51,0.3); }

  button#check-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-dk));
    color: var(--black);
    border: 2px solid var(--black);
    border-radius: 10px;
    padding: 0.85rem 1.6rem;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 3px 3px 0 var(--black);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button#check-btn:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--black); }
  button#check-btn:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 var(--black); }
  button#check-btn:disabled {
    opacity: 0.6; cursor: not-allowed;
    transform: none; box-shadow: 3px 3px 0 var(--black);
  }

  .error-box {
    display: none;
    margin-top: 0.75rem;
    padding: 0.75rem 1rem;
    background: rgba(210,31,39,0.08);
    border: 2px solid var(--red);
    border-radius: 10px;
    color: var(--red-dk);
    font-size: 0.88rem;
    font-weight: 500;
  }

  /* Results */
  .results { display: none; padding: 2rem 2.5rem 2.5rem; }

  .score-card {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 1.5rem;
    border-radius: 14px;
    border: 2px solid var(--black);
    margin-bottom: 1.25rem;
    box-shadow: 4px 4px 0 var(--black);
  }
  .score-card.green  { background: #f0fdf4; }
  .score-card.yellow { background: #fffbeb; }
  .score-card.red    { background: #fff1f2; }

  .traffic-light {
    width: 70px; height: 70px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.9rem; font-weight: 800;
    flex-shrink: 0;
    border: 2px solid var(--black);
  }
  .traffic-light.green  { background: #22c55e; color: #fff; }
  .traffic-light.yellow { background: var(--gold); color: var(--black); }
  .traffic-light.red    { background: var(--red); color: #fff; }

  .score-num { font-size: 2.4rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1; color: var(--black); }
  .score-num span { font-size: 1rem; font-weight: 500; color: rgba(51,51,51,0.4); }
  .score-label { font-size: 1rem; font-weight: 600; color: var(--black); margin-top: 0.25rem; }
  .score-url { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: rgba(51,51,51,0.35); margin-top: 0.25rem; word-break: break-all; }

  .checks { display: flex; flex-direction: column; gap: 0.5rem; }

  .check-item {
    display: flex; align-items: flex-start; gap: 1rem;
    padding: 1rem 1.2rem;
    border-radius: 10px;
    border: 2px solid transparent;
  }
  .check-item.passed  { background: #f0fdf4; border-color: rgba(34,197,94,0.35); }
  .check-item.warning { background: #fffbeb; border-color: rgba(246,171,23,0.5); }
  .check-item.failed  { background: #fff1f2; border-color: rgba(210,31,39,0.25); }

  .check-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
    border: 1.5px solid rgba(51,51,51,0.12);
  }
  .check-item.passed  .check-icon { background: rgba(34,197,94,0.15); }
  .check-item.warning .check-icon { background: rgba(246,171,23,0.2); }
  .check-item.failed  .check-icon { background: rgba(210,31,39,0.1); }

  .check-name {
    font-weight: 700; font-size: 0.95rem; color: var(--black);
    display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.55rem;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .check-item.passed  .badge { background: rgba(34,197,94,0.2);  color: #15803d; }
  .check-item.warning .badge { background: rgba(246,171,23,0.25); color: #92400e; }
  .check-item.failed  .badge { background: rgba(210,31,39,0.15);  color: var(--red-dk); }

  .check-detail { font-size: 0.83rem; color: rgba(51,51,51,0.55); line-height: 1.5; }

  .disclaimer {
    margin-top: 1.25rem;
    padding: 0.75rem 1rem;
    background: var(--beige);
    border-radius: 8px;
    border: 1px solid rgba(51,51,51,0.1);
    font-size: 0.78rem;
    color: rgba(51,51,51,0.4);
    text-align: center;
  }

  /* Branding footer */
  .footer {
    background: var(--black);
    padding: 0.9rem 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }
  .footer span {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
  }
  .footer strong { color: var(--gold); font-weight: 700; }

  @media (max-width: 580px) {
    .card { border-radius: 14px; box-shadow: 4px 4px 0 var(--black); }
    .header, .form-section, .results { padding: 1.5rem; }
    .input-row { flex-direction: column; }
    .score-card { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div class="card">
  <!-- Header -->
  <div class="header">
    <span class="header-icon">🛡️</span>
    <h1>DSGVO <span>Checker</span></h1>
    <p>Webseite auf DSGVO-Konformität prüfen</p>
  </div>
  <div class="accent-bar"></div>

  <!-- Form -->
  <div class="form-section">
    <div class="input-row">
      <input type="url" id="url-input" placeholder="https://beispiel.de" autocomplete="off" spellcheck="false" />
      <button id="check-btn">Jetzt prüfen →</button>
    </div>
    <div class="error-box" id="error-box"></div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="score-card" id="score-card">
      <div class="traffic-light" id="traffic-light"></div>
      <div>
        <div class="score-num" id="score-num"></div>
        <div class="score-label" id="score-label"></div>
        <div class="score-url" id="score-url"></div>
      </div>
    </div>
    <div class="checks" id="checks"></div>
    <div class="disclaimer">⚠️ Technische Ersteinschätzung — kein Ersatz für rechtliche Beratung</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>Powered by <strong>Pixel Ads GmbH</strong></span>
  </div>
</div>

<script>
const API = "https://web-production-5f4c8.up.railway.app";

const input      = document.getElementById("url-input");
const btn        = document.getElementById("check-btn");
const errorBox   = document.getElementById("error-box");
const results    = document.getElementById("results");
const scoreCard  = document.getElementById("score-card");
const lightEl    = document.getElementById("traffic-light");
const scoreNum   = document.getElementById("score-num");
const scoreLabel = document.getElementById("score-label");
const scoreUrl   = document.getElementById("score-url");
const checks     = document.getElementById("checks");

const LABELS = { green: "✅ Gut aufgestellt", yellow: "⚠️ Nachbesserung nötig", red: "🚨 Erhebliche Mängel" };
const ICONS  = { green: "✓", yellow: "!", red: "✗" };

function getStatus(item) {
  if (item.passed && !item.passed_with_warning) return "passed";
  if (item.passed_with_warning) return "warning";
  return "failed";
}
function getBadge(s) { return { passed: "OK", warning: "Achtung", failed: "Fehlt" }[s]; }
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function runCheck() {
  errorBox.style.display = "none";
  results.style.display  = "none";

  let url = input.value.trim();
  if (!url) { showError("Bitte eine URL eingeben."); return; }
  if (!url.startsWith("http")) url = "https://" + url;

  btn.disabled = true;
  btn.textContent = "⏳ Prüfe...";

  try {
    const resp = await fetch(API + "/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });
    const data = await resp.json();
    if (!resp.ok || data.error) { showError(data.error || "Serverfehler."); return; }
    render(data);
  } catch(e) {
    showError("Backend nicht erreichbar. Bitte erst CORS in app.py anpassen (siehe Anleitung).");
  } finally {
    btn.disabled = false;
    btn.textContent = "Jetzt prüfen →";
  }
}

function showError(msg) {
  errorBox.textContent = "⚠️ " + msg;
  errorBox.style.display = "block";
}

function render(data) {
  const tl = data.traffic_light;

  scoreCard.className = "score-card " + tl;
  lightEl.className = "traffic-light " + tl;
  lightEl.textContent = ICONS[tl];

  scoreNum.innerHTML = data.score + ' <span>/ 100</span>';
  scoreLabel.textContent = LABELS[tl];
  scoreUrl.textContent = data.url;

  checks.innerHTML = "";
  data.results.forEach(item => {
    const s = getStatus(item);
    const div = document.createElement("div");
    div.className = "check-item " + s;
    div.innerHTML = `
      <div class="check-icon">${esc(item.icon || "🔍")}</div>
      <div style="flex:1;min-width:0">
        <div class="check-name">
          ${esc(item.check)}
          <span class="badge">${getBadge(s)}</span>
        </div>
        <div class="check-detail">${esc(item.detail)}</div>
      </div>`;
    checks.appendChild(div);
  });

  results.style.display = "block";
  results.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

btn.addEventListener("click", runCheck);
input.addEventListener("keydown", e => { if (e.key === "Enter") runCheck(); });
</script>
</body>
</html>
